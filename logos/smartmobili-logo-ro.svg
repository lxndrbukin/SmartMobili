<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="100%" height="100%">
  <!-- Accent Badge with Wardrobe Icon -->
  <rect x="15" y="20" width="50" height="50" rx="12" fill="#C97A56" />
  
  <!-- Stylized Wardrobe Icon inside Badge -->
  <rect x="28" y="30" width="24" height="30" rx="3" stroke="#FFFFFF" stroke-width="2.5" fill="none" />
  <line x1="28" y1="52" x2="52" y2="52" stroke="#FFFFFF" stroke-width="2" />
  <line x1="40" y1="30" x2="40" y2="52" stroke="#FFFFFF" stroke-width="2" />
  <circle cx="37" cy="40" r="1.5" fill="#FFFFFF" />
  <circle cx="43" cy="40" r="1.5" fill="#FFFFFF" />
  <line x1="37" y1="56" x2="43" y2="56" stroke="#FFFFFF" stroke-width="2" />

  <!-- Logo Typography -->
  <text x="80" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1E1D1B">Smart<tspan font-weight="300" fill="#C97A56">Mobili</tspan></text>
  
  <!-- Tagline (Romanian) -->
  <text x="82" y="63" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="600" fill="#6B6560" letter-spacing="0.18em">MOBILĂ LA COMANDĂ</text>
</svg>

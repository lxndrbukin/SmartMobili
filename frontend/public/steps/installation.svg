<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" fill="none">
  <!-- Background decorative elements -->
  <circle cx="32" cy="32" r="26" fill="#fcf7f4" />
  <circle cx="32" cy="32" r="20" fill="#f0ddd0" opacity="0.5" />
  
  <!-- Furniture Cabinet / Wardrobe representation -->
  <rect x="18" y="16" width="22" height="34" rx="2" fill="#ffffff" stroke="#d9a98a" stroke-width="2" stroke-linejoin="round" />
  <!-- Vertical split of double doors -->
  <path d="M29 16v34" stroke="#d9a98a" stroke-width="1.5" />
  <!-- Shelf lines / horizontal drawers internally represented -->
  <path d="M18 28h11M29 36h11" stroke="#f0ddd0" stroke-width="1.5" />
  <!-- Door handles -->
  <path d="M26 24v4M32 30v4" stroke="#d9a98a" stroke-width="2" stroke-linecap="round" />
  
  <!-- Wrench (Tool representing assembly/installation) -->
  <g transform="translate(6, 6)">
    <!-- Wrench handle -->
    <path d="M32 32l8 8m-2-6l4 4" stroke="#c97a56" stroke-width="3" stroke-linecap="round" />
    <!-- Wrench open end/head -->
    <path d="M28 28a6 6 0 0 1 10.2-4.2l-3.2 3.2-3.2-3.2A6 6 0 0 1 28 28z" fill="#ffffff" stroke="#c97a56" stroke-width="2" stroke-linejoin="round" />
  </g>
  
  <!-- Sparkles / Star representing fresh installation -->
  <path d="M48 16l1 2 2 1-2 1-1 2-1-2-2-1 2-1z" fill="#c97a56" />
  <path d="M14 24l0.5 1 1 0.5-1 0.5-0.5 1-0.5-1-1-0.5 1-0.5z" fill="#d9a98a" />
</svg>

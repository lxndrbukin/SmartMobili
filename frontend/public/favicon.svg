<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background matching logo-badge accent color -->
  <rect width="32" height="32" rx="6" fill="#c97a56"/>

  <!-- Wardrobe body -->
  <rect x="5" y="4" width="22" height="21" rx="1.5" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Cornice / top shelf line -->
  <line x1="5" y1="9" x2="27" y2="9" stroke="white" stroke-width="1.5"/>

  <!-- Center door divider -->
  <line x1="16" y1="9" x2="16" y2="25" stroke="white" stroke-width="1.5"/>

  <!-- Left door handle -->
  <circle cx="13" cy="17.5" r="1.2" fill="white"/>

  <!-- Right door handle -->
  <circle cx="19" cy="17.5" r="1.2" fill="white"/>

  <!-- Left foot -->
  <rect x="7.5" y="25" width="3" height="3" rx="0.5" fill="white"/>

  <!-- Right foot -->
  <rect x="21.5" y="25" width="3" height="3" rx="0.5" fill="white"/>
</svg>
